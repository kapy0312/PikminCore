<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Growth Center</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f2e9;
            background-image: radial-gradient(#a3d9b1 2px, transparent 2px);
            background-size: 40px 40px;
            color: #2d3748;
        }

        .glassmorphism {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        @keyframes jump {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-15px) scale(1.05);
            }
        }

        .animate-jump {
            animation: jump 0.4s ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .heart-clip {
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/javascript">
        const { useState, useEffect, useCallback, useRef, createElement } = React;
        const html = htm.bind(createElement);

        const GAS_DEPLOY_URL = 'https://script.google.com/macros/s/AKfycbwtx1yag2PSNVXDLs_6LIimG2bMbDdXKUVZhBVSJN-rJR48UDwk6wA9g6Ke4AXxmu7hVw/exec'; // 部署後替換
        const GIFT_DURATION_MS = 30 * 60 * 1000; // 禮物倒數 30 分鐘 (毫秒)

        // 建立造型英文轉中文的字典 (需求 1)
        const DecorNameMap = {
            'chef_hat': '廚師帽',
            'cup': '咖啡杯',
            'kimchi': '泡菜'
        };

        const AssetMap = {
            red: { colorCode: '#EF4444', name: '紅皮克敏', pot: './assets/red_pot.png', base: './assets/red_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/red_chef_hat.png', 'cup': './assets/red_cup.png' } },
            yellow: { colorCode: '#F59E0B', name: '黃皮克敏', pot: './assets/yellow_pot.png', base: './assets/yellow_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/yellow_chef_hat.png', 'cup': './assets/yellow_cup.png' } },
            blue: { colorCode: '#3B82F6', name: '藍皮克敏', pot: './assets/blue_pot.png', base: './assets/blue_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/blue_chef_hat.png', 'cup': './assets/blue_cup.png' } },
            purple: { colorCode: '#8B5CF6', name: '紫皮克敏', pot: './assets/purple_pot.png', base: './assets/purple_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/purple_chef_hat.png', 'cup': './assets/purple_cup.png' } },
            white: { colorCode: '#D1D5DB', name: '白皮克敏', pot: './assets/white_pot.png', base: './assets/white_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/white_chef_hat.png', 'cup': './assets/white_cup.png' } },
            rock: { colorCode: '#4B5563', name: '岩石皮克敏', pot: './assets/rock_pot.png', base: './assets/rock_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/rock_chef_hat.png', 'cup': './assets/rock_cup.png' } },
            winged: { colorCode: '#EC4899', name: '羽翅皮克敏', pot: './assets/winged_pot.png', base: './assets/winged_base.png', decors: ['chef_hat', 'cup'], decorImages: { 'chef_hat': './assets/winged_chef_hat.png', 'cup': './assets/winged_cup.png' } },
            ice: { colorCode: '#06B6D4', name: '冰凍皮克敏', pot: './assets/ice_pot.png', base: './assets/ice_base.png', decors: ['chef_hat', 'kimchi'], decorImages: { 'chef_hat': './assets/ice_chef_hat.png', 'kimchi': './assets/ice_kimchi.png' } }
        };

        const HeartProgress = ({ energy, heartCapacity }) => {
            const hearts = [0, 1, 2, 3].map(index => {
                const threshold = index * heartCapacity;
                let fillPercent = 0;
                if (energy > threshold) {
                    fillPercent = Math.min(100, ((energy - threshold) / heartCapacity) * 100);
                }
                return html`
                    <div key=${index} className="relative w-8 h-8 bg-gray-300 heart-clip overflow-hidden">
                        <div className="absolute bottom-0 left-0 w-full bg-red-500 transition-all duration-300 ease-out" 
                             style=${{ height: `${fillPercent}%` }}></div>
                    </div>
                `;
            });
            return html`<div className="flex gap-2">${hearts}</div>`;
        };

        function App() {
            const [groups, setGroups] = useState([]);
            const [appConfig, setAppConfig] = useState({ heartCapacity: 5, maxEnergy: 20 });
            const [loading, setLoading] = useState(true);
            const [newGroupName, setNewGroupName] = useState('');
            const [selectedGroup, setSelectedGroup] = useState(null);
            const [animating, setAnimating] = useState(false);
            const [now, setNow] = useState(Date.now());

            const processedGiftsRef = useRef(new Set());

            useEffect(() => {
                const timer = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                groups.forEach(group => {
                    if (group.energy >= appConfig.maxEnergy && group.activeDecor && group.activeDecor.startsWith('GIFT_')) {
                        const match = group.activeDecor.match(/^GIFT_(\d+)_(.+)$/);
                        if (!match) return;

                        const timestamp = parseInt(match[1], 10);
                        const finalDecor = match[2];

                        if (Date.now() - timestamp >= GIFT_DURATION_MS && !processedGiftsRef.current.has(group.id)) {
                            processedGiftsRef.current.add(group.id);

                            console.log(`[系統日誌] 觸發進化，寫入最終造型: ${finalDecor}`);

                            const updatedGroup = { ...group, activeDecor: finalDecor };

                            setGroups(prev => prev.map(g => g.id === group.id ? updatedGroup : g));
                            if (selectedGroup && selectedGroup.id === group.id) {
                                setSelectedGroup(updatedGroup);
                            }

                            fetch(GAS_DEPLOY_URL, {
                                method: 'POST',
                                body: JSON.stringify({
                                    action: 'updateEnergy',
                                    id: group.id,
                                    energy: group.energy,
                                    feedableEnergy: group.feedableEnergy,
                                    activeDecor: finalDecor
                                })
                            }).catch(err => console.error('API 請求失敗:', err));
                        }
                    }
                });
            }, [groups, now, selectedGroup]);

            const fetchAllData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${GAS_DEPLOY_URL}?action=getAll`);
                    const json = await res.json();
                    if (json.status === 200) {
                        setGroups(json.data.groups);
                        if (json.data.config) setAppConfig(json.data.config);
                    }
                } catch (err) { console.error(err); }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (GAS_DEPLOY_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
                    alert("請配置 GAS_DEPLOY_URL");
                    setLoading(false);
                    return;
                }
                fetchAllData();
            }, [fetchAllData]);

            const handleAddGroup = async () => {
                if (!newGroupName.trim()) return;
                setLoading(true);
                try {
                    const res = await fetch(GAS_DEPLOY_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'addGroup', name: newGroupName })
                    });
                    const json = await res.json();
                    if (json.status === 200) {
                        setNewGroupName('');
                        await fetchAllData();
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const handleDeleteGroup = async (id) => {
                if (!confirm('確定要刪除此組別嗎？')) return;
                setGroups(prev => prev.filter(g => g.id !== id));
                setSelectedGroup(null);
                fetch(GAS_DEPLOY_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'deleteGroup', id })
                });
            };

            // 新增功能 2: 修改組別名稱 (支援 Optimistic UI)
            const handleEditGroupName = (group) => {
                const newName = prompt('請輸入新的組別名稱：', group.name);
                if (newName !== null && newName.trim() !== '' && newName.trim() !== group.name) {
                    const trimmedName = newName.trim();

                    // 先在前端更新畫面 (Optimistic UI)
                    setGroups(prev => prev.map(g => g.id === group.id ? { ...g, name: trimmedName } : g));
                    if (selectedGroup && selectedGroup.id === group.id) {
                        setSelectedGroup(prev => ({ ...prev, name: trimmedName }));
                    }

                    // 背景發送 API 更新資料庫
                    fetch(GAS_DEPLOY_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'updateGroupName', id: group.id, name: trimmedName })
                    }).catch(err => console.error('更名失敗:', err));
                }
            };

            const handleFeed = () => {
                if (!selectedGroup || selectedGroup.feedableEnergy <= 0 || animating) return;

                setAnimating(true);
                setTimeout(() => setAnimating(false), 400);

                const currentEnergy = selectedGroup.energy;
                const nextEnergy = currentEnergy + 1;
                const nextFeedable = selectedGroup.feedableEnergy - 1;
                let activeDecor = selectedGroup.activeDecor;
                if (nextEnergy === appConfig.maxEnergy && !activeDecor) {
                    const colorData = AssetMap[selectedGroup.colorKey];
                    const randomDecor = colorData.decors[Math.floor(Math.random() * colorData.decors.length)];
                    activeDecor = `GIFT_${Date.now()}_${randomDecor}`;
                    alert(`✨ 滿好感度！皮克敏準備去拿取禮物！`);
                } else if (currentEnergy === 0) {
                    alert(`🌱 花盆孵化了！`);
                }

                const updatedGroup = { ...selectedGroup, energy: nextEnergy, feedableEnergy: nextFeedable, activeDecor };
                setSelectedGroup(updatedGroup);
                setGroups(prev => prev.map(g => g.id === updatedGroup.id ? updatedGroup : g));

                fetch(GAS_DEPLOY_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateEnergy',
                        id: updatedGroup.id,
                        energy: nextEnergy,
                        feedableEnergy: nextFeedable,
                        activeDecor: activeDecor
                    })
                });
            };

            const getPikminImage = (group) => {
                const colorData = AssetMap[group.colorKey];
                if (!colorData) return '';
                if (group.energy === 0) return colorData.pot;

                if (group.energy >= appConfig.maxEnergy && group.activeDecor) {
                    // 若狀態為拿取禮物中，維持顯示基本款圖片
                    if (group.activeDecor.startsWith('GIFT_')) {
                        return colorData.base;
                    }
                    // 時間到進化後，顯示造型款圖片
                    return colorData.decorImages[group.activeDecor];
                }

                return colorData.base;
            };

            // 新增功能 1: 乾淨俐落的命名邏輯
            const getDisplayName = (group) => {
                if (group.energy === 0) return '花盆';
                const baseName = AssetMap[group.colorKey]?.name || '皮克敏';

                if (group.energy >= appConfig.maxEnergy) {
                    if (group.activeDecor && group.activeDecor.startsWith('GIFT_')) {
                        return `${baseName}-拿取禮物中`;
                    }
                    // 翻譯造型名稱，若字典沒有則回傳原 key
                    const decorName = DecorNameMap[group.activeDecor] || group.activeDecor;
                    return `${baseName}-${decorName}`;
                }

                // 基本階段
                return baseName;
            };

            // 新增功能：將倒數計時器邏輯模組化，讓列表與彈窗共用
            const getCountdownString = (activeDecor) => {
                const match = activeDecor.match(/^GIFT_(\d+)_(.+)$/);
                if (!match) return '';
                const timestamp = parseInt(match[1], 10);
                const remain = Math.max(0, GIFT_DURATION_MS - (now - timestamp));
                const mins = Math.floor(remain / 60000).toString().padStart(2, '0');
                const secs = Math.floor((remain % 60000) / 1000).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            return html`
                <div className="container mx-auto p-6 max-w-6xl min-h-screen">
                    
                    <a 
                        href="https://docs.google.com/spreadsheets/d/1Xu6WmzwVUjkd0-nhuIF_BbqPs8S8ZpwEWWDPUwWX1GE/edit?gid=1031061317#gid=1031061317" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="fixed top-0 right-0 w-4 h-4 z-50 opacity-0 hover:opacity-10 bg-black cursor-pointer transition-opacity"
                        title="管理資料庫"
                    ></a>

                    <header className="glassmorphism rounded-3xl p-6 mb-8 flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-black text-green-800 tracking-wide">🌱 Pikmin Growth Center</h1>
                            <p className="text-green-600 font-bold mt-1">班級加分與皮克敏養成系統</p>
                        </div>
                        <div className="flex gap-4">
                            <button 
                                onClick=${fetchAllData} 
                                disabled=${loading} 
                                className="p-3 bg-white/50 hover:bg-white rounded-xl shadow-sm text-green-700 transition-colors border border-green-200 flex items-center justify-center"
                                title="同步最新資料庫狀態"
                            >
                                <svg className=${`w-6 h-6 ${loading ? 'animate-spin text-green-500' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                            </button>
                            <input
                                type="text"
                                value=${newGroupName}
                                onChange=${e => setNewGroupName(e.target.value)}
                                placeholder="輸入新組別名稱"
                                className="border-2 border-green-200 rounded-xl p-3 focus:outline-none focus:border-green-500 font-bold bg-white/70"
                            />
                            <button onClick=${handleAddGroup} disabled=${loading} className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-colors whitespace-nowrap">
                                新增組別
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${groups.map(group => html`
                            <div key=${group.id} onClick=${() => setSelectedGroup(group)}
                                className="glassmorphism rounded-3xl p-6 cursor-pointer hover:-translate-y-2 transition-all duration-300 border-2 border-transparent hover:border-green-400 relative flex flex-col items-center">
                                
                                ${group.feedableEnergy > 0 ? html`
                                    <span className="absolute top-4 right-4 bg-red-500 text-white text-xs font-black px-3 py-1 rounded-full animate-pulse shadow-md">
                                        精華 +${group.feedableEnergy}
                                    </span>
                                ` : null}

                                ${(group.activeDecor && group.activeDecor.startsWith('GIFT_')) ? html`
                                    <span className="absolute top-4 left-4 bg-red-50 text-red-500 text-xs font-black px-3 py-1 rounded-full border-2 border-red-200 shadow-sm animate-pulse z-10">
                                        ⏳ ${getCountdownString(group.activeDecor)}
                                    </span>
                                ` : null}

                                <div className="w-32 h-32 mb-4 relative flex justify-center items-end animate-float">
                                    <img src=${getPikminImage(group)} className="w-full h-full object-contain drop-shadow-lg" />
                                    ${(group.activeDecor && group.activeDecor.startsWith('GIFT_')) ? html`
                                        <div className="absolute -bottom-2 -right-2 w-12 h-12 z-10 animate-bounce">
                                            <img src="./assets/gift.png" className="w-full h-full object-contain drop-shadow-md" />
                                        </div>
                                    ` : null}
                                </div>
                                
                                <h2 className="text-2xl font-black text-gray-800 mb-1">${group.name}</h2>
                                <p className="text-sm font-bold text-gray-500 mb-4 px-3 py-1 bg-white/50 rounded-full">
                                    ${getDisplayName(group)}
                                </p>

                                <!--1. 卡片層級-->
                               <${HeartProgress} energy=${group.energy} heartCapacity=${appConfig.heartCapacity} />
                            </div>
                        `)}
                    </div>

                    ${selectedGroup ? html`
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                            <div className="glassmorphism bg-white/90 rounded-[2rem] w-full max-w-md p-8 relative shadow-2xl border-4 border-white">
                                <button onClick=${() => setSelectedGroup(null)} className="absolute top-5 right-5 text-gray-400 hover:text-gray-700 bg-gray-100 rounded-full p-2 transition-colors">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>

                                    <div className="flex flex-col items-center mb-8">
                                    <div className="flex items-center gap-3 mb-2">
                                        <h3 className="text-3xl font-black text-gray-800">${selectedGroup.name}</h3>
                                        <button 
                                            onClick=${() => handleEditGroupName(selectedGroup)} 
                                            className="p-2 text-gray-400 hover:text-green-600 bg-gray-100 hover:bg-green-50 rounded-full transition-colors shadow-sm"
                                            title="編輯組別名稱"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                        </button>
                                    </div>
                                    <p className="text-green-600 font-bold bg-green-100 px-4 py-1 rounded-full mb-6">${getDisplayName(selectedGroup)}</p>
                                    
                                    ${(selectedGroup.activeDecor && selectedGroup.activeDecor.startsWith('GIFT_')) ? html`
                                        <div className="text-red-500 font-black text-2xl mb-4 animate-pulse bg-red-50 px-4 py-2 rounded-xl border-2 border-red-200 shadow-sm">
                                            倒數 ${getCountdownString(selectedGroup.activeDecor)}
                                        </div>
                                    ` : null}

                                    <div className=${`w-48 h-48 relative flex justify-center items-center ${animating ? 'animate-jump' : ''}`}>
                                        <img src=${getPikminImage(selectedGroup)} className="w-full h-full object-contain drop-shadow-2xl" />
                                        ${(selectedGroup.activeDecor && selectedGroup.activeDecor.startsWith('GIFT_')) ? html`
                                            <div className="absolute -bottom-4 -right-4 w-16 h-16 z-10 animate-bounce">
                                                <img src="./assets/gift.png" className="w-full h-full object-contain drop-shadow-xl" />
                                            </div>
                                        ` : null}
                                    </div>
                                </div>

                                <div className="bg-green-50/50 rounded-2xl p-6 mb-6 border border-green-100">
                                    <div className="flex flex-col items-center gap-4 mb-4">
                                        <!-- 2. Modal 互動視窗層級-->
                                        <span className="font-bold text-gray-600">好感度進度 (${selectedGroup.energy}/${appConfig.maxEnergy})</span>
                                        <${HeartProgress} energy=${selectedGroup.energy} heartCapacity=${appConfig.heartCapacity} />
                                    </div>
                                </div>

                                <!-- 3. 餵食按鈕邏輯 -->
                                <button 
                                    onClick=${handleFeed} 
                                    disabled=${selectedGroup.feedableEnergy <= 0 || selectedGroup.energy >= appConfig.maxEnergy}
                                    className="w-full bg-gradient-to-r from-green-400 to-emerald-500 disabled:from-gray-300 disabled:to-gray-400 hover:from-green-500 hover:to-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg text-xl active:scale-95 transition-all flex justify-center items-center gap-2"
                                >
                                    ${selectedGroup.energy >= appConfig.maxEnergy ? '已達滿好感' : (selectedGroup.feedableEnergy > 0 ? `餵食精華 (剩餘: ${selectedGroup.feedableEnergy})` : '目前無精華可餵')}
                                </button>

                                <div className="mt-6 text-center">
                                    <button onClick=${() => handleDeleteGroup(selectedGroup.id)} className="text-red-400 text-sm font-bold hover:text-red-600 transition-colors">
                                        拔除此皮克敏 (刪除組別)
                                    </button>
                                </div>
                            </div>
                        </div>
                    ` : null}

                    ${loading ? html`
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-md flex flex-col justify-center items-center z-[100]">
                            <!--<img src="https://i.redd.it/tpmvpith04281.gif" alt="loading" className="w-48 h-48 mb-6 object-contain" />-->
                            <img src="https://i.makeagif.com/media/11-07-2024/p-hi7V.gif" alt="loading" className="w-48 h-48 mb-6 object-contain" />
                            <h2 className="text-2xl font-black text-green-700 tracking-widest animate-pulse">連線同步中...</h2>
                        </div>
                    ` : null}
                </div>
            `;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>

</html>
